<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/main.css">
  <title>Frontend Mentor | Results summary component</title>
</head>
<body>
  <main class="card">
    <section class="result">
      <h1 class="result__title">Your Result</h1>
      <div class="result__score">
        <span class="result__score-value">76</span>
        <span class="result__score-total">of 100</span>
      </div>
      <div class="result__summary">
        <h2 class="result__rank">Great</h2>
        <p class="result__description">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </section>

    <section class="summary">
      <h2 class="summary__title">Summary</h2>
      <ul class="summary__list">
        <li class="summary__item summary__item--reaction">
          <div class="summary__item-label">
            <img src="/images/icon-reaction.svg" alt="" class="summary__item-icon">
            <span class="summary__item-name">Reaction</span>
          </div>
          <div class="summary__item-score">
            <span class="summary__item-value">80</span>
            <span class="summary__item-total">/ 100</span>
          </div>
        </li>
        <li class="summary__item summary__item--memory">
          <div class="summary__item-label">
            <img src="/images/icon-memory.svg" alt="" class="summary__item-icon">
            <span class="summary__item-name">Memory</span>
          </div>
          <div class="summary__item-score">
            <span class="summary__item-value">92</span>
            <span class="summary__item-total">/ 100</span>
          </div>
        </li>
        <li class="summary__item summary__item--verbal">
          <div class="summary__item-label">
            <img src="/images/icon-verbal.svg" alt="" class="summary__item-icon">
            <span class="summary__item-name">Verbal</span>
          </div>
          <div class="summary__item-score">
            <span class="summary__item-value">61</span>
            <span class="summary__item-total">/ 100</span>
          </div>
        </li>
        <li class="summary__item summary__item--visual">
          <div class="summary__item-label">
            <img src="/images/icon-visual.svg" alt="" class="summary__item-icon">
            <span class="summary__item-name">Visual</span>
          </div>
          <div class="summary__item-score">
            <span class="summary__item-value">72</span>
            <span class="summary__item-total">/ 100</span>
          </div>
        </li>
      </ul>
      <button class="summary__button" type="button">Continue</button>
    </section>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Gustavo Sanchez</a>.
  </footer>
</body>
</html>
